version: "3.11"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      # Persist data and models outside the container
      - ./backend/data:/app/data
      - ./backend/models:/app/models
    env_file:
      - .env
    # Keep stdin open for the interactive CLI pipeline
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    env_file:
      - .env
